<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Laboratorio Semana 7 - Estudiantes (Supabase + JS)</title>

    <style>
      /* Base */
      :root {
        --bg: #0b2d39;
        --accent: #10cfc8;
        --accent2: #eb6763;
        --card: #ffffff;
        --muted: #64748b;
        --border: #e5e7eb;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f6f7fb;
        color: #0f172a;
      }

      .container {
        max-width: 980px;
        margin: 0 auto;
        padding: 16px;
      }

      .header {
        border-radius: 16px;
        padding: 18px;
        background: var(--bg);
        color: #fff;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.16);
        border: 2px solid var(--accent);
      }

      .header-title {
        font-size: 22px;
        font-weight: 800;
        margin: 6px 0 0;
      }

      .header-subtitle {
        font-size: 14px;
        opacity: 0.92;
        margin: 6px 0 0;
      }

      .card {
        margin-top: 14px;
        border-radius: 14px;
        background: var(--card);
        border: 1px solid var(--border);
        box-shadow: 0 8px 18px rgba(2, 6, 23, 0.06);
        padding: 14px;
      }

      /* Controls */
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: end;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        min-width: 220px;
        flex: 1;
      }

      label {
        font-size: 12px;
        color: var(--muted);
        font-weight: 700;
      }

      input,
      select {
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        outline: none;
        font-size: 14px;
        background: #fff;
      }

      .btn {
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid transparent;
        cursor: pointer;
        font-weight: 800;
        font-size: 14px;
        transition: transform 0.04s ease;
        white-space: nowrap;
      }

      .btn:active {
        transform: translateY(1px);
      }

      .btn-primary {
        background: var(--accent);
        color: #05323a;
      }

      .btn-secondary {
        background: #fff;
        color: #0f172a;
        border-color: var(--border);
      }

      .btn-danger {
        background: var(--accent2);
        color: #fff;
      }

      /* Status */
      .status {
        margin-top: 10px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        font-size: 14px;
        color: #0f172a;
        background: #fff;
      }

      .status-muted {
        color: var(--muted);
      }

      .status-error {
        border-color: #fecaca;
        background: #fff1f2;
        color: #9f1239;
      }

      /* Table */
      .table-wrap {
        overflow: auto;
        border-radius: 12px;
        border: 1px solid var(--border);
        margin-top: 12px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
        min-width: 760px;
      }

      thead th {
        background: var(--bg);
        color: #fff;
        text-align: left;
        padding: 10px;
        position: sticky;
        top: 0;
        z-index: 1;
      }

      tbody td {
        padding: 10px;
        border-top: 1px solid var(--border);
      }

      tbody tr:nth-child(even) {
        background: #f8fafc;
      }

      .footer {
        margin-top: 14px;
        text-align: center;
        font-size: 12px;
        color: var(--muted);
      }

      .badge {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(16, 207, 200, 0.18);
        color: #05323a;
        border: 1px solid rgba(16, 207, 200, 0.45);
        font-weight: 800;
        font-size: 12px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- Header -->
      <div class="header">
        <div style="display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: space-between">
          <div>
            <div style="font-size: 12px; opacity: 0.9">II-51 Programación Internet</div>
            <div class="header-title">Laboratorio Semana 7</div>
            <div class="header-subtitle">Consulta de estudiantes (JavaScript + Supabase)</div>
          </div>
          <div class="badge">DOM + API + Tabla dinámica</div>
        </div>
      </div>

      <!-- Controls -->
      <div class="card">
        <div style="font-weight: 900; color: #0b2d39; margin-bottom: 10px">Filtros</div>

        <div class="controls">
          <div class="field">
            <label for="txtSearch">Buscar por nombre</label>
            <input id="txtSearch" type="text" placeholder="Ej: Ana" />
          </div>

          <div class="field" style="max-width: 260px">
            <label for="selOrder">Orden</label>
            <select id="selOrder">
              <option value="asc">Nombre ASC</option>
              <option value="desc">Nombre DESC</option>
            </select>
          </div>

          <button id="btnLoad" class="btn btn-primary" type="button">Consultar</button>
          <button id="btnClear" class="btn btn-secondary" type="button">Limpiar</button>
        </div>

        <div id="status" class="status status-muted">Listo. Presiona “Consultar”.</div>
      </div>

      <!-- Table -->
      <div class="card">
        <div style="display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: space-between">
          <div style="font-weight: 900; color: #0b2d39">Resultados</div>
          <div id="count" class="badge">0 registros</div>
        </div>

        <div class="table-wrap">
          <table aria-label="Tabla de estudiantes">
            <thead>
              <tr>
                <th style="width: 90px">ID</th>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Correo</th>
                <th>Carrera</th>
              </tr>
            </thead>
            <tbody id="tbodyStudents">
            </tbody>
          </table>
        </div>
      </div>

      <div class="footer">Universidad Central • II-51 • Semana 7</div>
    </div>

    <!-- Supabase (Browser) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
      /******************************************************************
       *  CONFIG
       *  Replace with your Supabase project values
       ******************************************************************/

      const SUPABASE_URL = "https://vxoszugvginrsttxnika.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4b3N6dWd2Z2lucnN0dHhuaWthIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTMzMjA0ODMsImV4cCI6MjA2ODg5NjQ4M30.BUdy45pw6RbgbHhN45q3zpaWgKCsDJH_s78HKemQ_PA";

      const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      /******************************************************************
       *  UI refs
       ******************************************************************/
      const txtSearch = document.getElementById("txtSearch");
      const selOrder = document.getElementById("selOrder");
      const btnLoad = document.getElementById("btnLoad");
      const btnClear = document.getElementById("btnClear");

      const statusEl = document.getElementById("status");
      const tbodyStudents = document.getElementById("tbodyStudents");
      const countEl = document.getElementById("count");

      /******************************************************************
       *  Helpers
       ******************************************************************/
      function setStatus(message, kind = "muted") {
        statusEl.className = "status " + (kind === "error" ? "status-error" : "status-muted");
        statusEl.textContent = message;
      }

      function setCount(n) {
        countEl.textContent = `${n} registros`;
      }

      function clearTable() {
        tbodyStudents.innerHTML = "";
        setCount(0);
      }

      function renderRows(rows) {
        clearTable();

        if (!rows || rows.length === 0) {
          setStatus("Sin resultados.", "muted");
          return;
        }

        const frag = document.createDocumentFragment();

        rows.forEach((r) => {
          const tr = document.createElement("tr");

          const tdId = document.createElement("td");
          tdId.textContent = r.id ?? "";
          tr.appendChild(tdId);

          const tdNombre = document.createElement("td");
          tdNombre.textContent = r.nombre ?? "";
          tr.appendChild(tdNombre);

          const tdApellido = document.createElement("td");
          tdApellido.textContent = r.apellido ?? "";
          tr.appendChild(tdApellido);

          const tdCorreo = document.createElement("td");
          tdCorreo.textContent = r.correo ?? "";
          tr.appendChild(tdCorreo);

          const tdCarrera = document.createElement("td");
          tdCarrera.textContent = r.carrera ?? "";
          tr.appendChild(tdCarrera);

          frag.appendChild(tr);
        });

        tbodyStudents.appendChild(frag);
        setCount(rows.length);
        setStatus("Consulta completada.", "muted");
      }

      /******************************************************************
       *  Data
       ******************************************************************/
      async function loadStudents() {
        try {
          setStatus("Cargando...", "muted");

          const search = (txtSearch.value || "").trim();
          const order = selOrder.value; // asc | desc

          let query = supabaseClient
            .from("estudiantes")
            .select("id,nombre,apellido,correo,carrera")
            .order("nombre", { ascending: order === "asc" });

          // Simple search by name (ilike)
          if (search.length > 0) {
            query = query.ilike("nombre", `%${search}%`);
          }

          const { data, error } = await query;

          if (error) {
            setStatus(`Error: ${error.message}`, "error");
            clearTable();
            return;
          }

          renderRows(data);
        } catch (err) {
          setStatus("Error inesperado. Revisa consola.", "error");
          console.error(err);
          clearTable();
        }
      }

      /******************************************************************
       *  Events
       ******************************************************************/
      btnLoad.addEventListener("click", loadStudents);

      btnClear.addEventListener("click", () => {
        txtSearch.value = "";
        selOrder.value = "asc";
        clearTable();
        setStatus("Listo. Presiona “Consultar”.", "muted");
      });

      // Optional: search on Enter
      txtSearch.addEventListener("keydown", (e) => {
        if (e.key === "Enter") loadStudents();
      });
    </script>
  </body>
</html>
